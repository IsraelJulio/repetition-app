<div class="quiz-page">
  <div class="page-header">
    <div>
      <h1>{{ title }}</h1>
      <p>Configure as informações do quiz e suas perguntas.</p>
    </div>

    <p-button
      *ngIf="title !== 'Create Quiz'"
      label="Excluir"
      icon="pi pi-trash"
      styleClass="p-button-danger"
      (click)="showDialog()"
    ></p-button>
  </div>

  <form [formGroup]="quizForm" (ngSubmit)="onSubmit()" autocomplete="off">
    <div class="card">
      <h2>Informações do quiz</h2>

      <div class="form-grid">
        <div class="field">
          <label>Título</label>
          <span class="p-input-icon-left">
            <i class="pi pi-bookmark-fill"></i>
            <input
              pInputText
              type="text"
              formControlName="title"
              placeholder="Digite o título"
            />
          </span>
        </div>

        <div class="field">
          <label>Descrição</label>
          <span class="p-input-icon-left">
            <i class="pi pi-align-justify"></i>
            <input
              pInputText
              type="text"
              formControlName="description"
              placeholder="Digite a descrição"
            />
          </span>
        </div>

        <div class="field">
          <label>Categoria</label>
          <p-dropdown
            placeholder="Selecione"
            [options]="categories"
            formControlName="categoryId"
            optionValue="id"
            optionLabel="name"
          ></p-dropdown>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>Perguntas</h2>

        <div class="actions">
          <p-button
            label="Adicionar"
            icon="pi pi-plus"
            styleClass="p-button-sm"
            type="button"
            (click)="addNewRow()"
          ></p-button>

          <p-button
            label="Remover"
            icon="pi pi-times"
            styleClass="p-button-sm p-button-danger"
            type="button"
            (click)="removeRow()"
          ></p-button>
        </div>
      </div>

      <div formArrayName="questions" class="questions-list">
        <div
          class="question-card"
          *ngFor="let question of getControls(); let i = index"
          [formGroupName]="i"
        >
          <div class="question-number">{{ i + 1 }}</div>

          <div class="question-fields">
            <div class="field">
              <label>Frente</label>
              <span class="p-input-icon-left">
                <i class="pi pi-chevron-left"></i>
                <input
                  pInputText
                  type="text"
                  [id]="'front' + i"
                  formControlName="front"
                  placeholder="Frente do cartão"
                />
              </span>
            </div>

            <div class="field">
              <label>Verso</label>
              <span class="p-input-icon-left">
                <i class="pi pi-chevron-right"></i>
                <input
                  pInputText
                  type="text"
                  [id]="'back' + i"
                  formControlName="back"
                  placeholder="Verso do cartão"
                />
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-actions">
      <p-button
        label="Salvar"
        icon="pi pi-check"
        styleClass="p-button-success"
        type="submit"
        [disabled]="!quizForm.valid"
      ></p-button>
    </div>
  </form>
</div>

<p-toast></p-toast>

<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '420px' }"
  styleClass="delete-dialog"
>
  <ng-template pTemplate="header">
    <span class="dialog-title">Excluir quiz</span>
  </ng-template>

  <p>Tem certeza que deseja excluir este quiz?</p>

  <ng-template pTemplate="footer">
    <p-button
      icon="pi pi-times"
      label="Cancelar"
      styleClass="p-button-text"
      (click)="visible = false"
    ></p-button>

    <p-button
      icon="pi pi-check"
      label="Excluir"
      styleClass="p-button-danger"
      (click)="handleDelete()"
    ></p-button>
  </ng-template>
</p-dialog>
